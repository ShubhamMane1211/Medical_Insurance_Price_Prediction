{% extends "base.html" %}
{% block title %}Page Not Found{% endblock %}
{% block content %}
<div class="container py-5 text-center">
    <i class="bi bi-signpost-split fs-1 text-secondary"></i>
    <h2 class="fw-bold mt-3">404 — Page Not Found</h2>
    <p class="text-secondary">The page you're looking for doesn't exist.</p>
    <a href="{{ url_for('index') }}" class="btn btn-primary mt-2">Back to Home</a>
</div>
{% endblock %}
