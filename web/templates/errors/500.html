{% extends "base.html" %}
{% block title %}Server Error{% endblock %}
{% block content %}
<div class="container py-5 text-center">
    <i class="bi bi-exclamation-triangle-fill fs-1 text-warning"></i>
    <h2 class="fw-bold mt-3">500 — Something Went Wrong</h2>
    <p class="text-secondary">An unexpected error occurred on our end. Please try again shortly.</p>
    <a href="{{ url_for('index') }}" class="btn btn-primary mt-2">Back to Home</a>
</div>
{% endblock %}
